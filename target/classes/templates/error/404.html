<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>404 - Not Found</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="error-page">
<div class="error-container">
  <div class="error-code">404</div>
  <div class="error-logo">IB</div>
  <h2>Page Not Found</h2>
  <p th:text="${message ?: 'The resource you are looking for does not exist.'}"></p>
  <a href="/dashboard" class="btn btn-primary"><i class="fas fa-home"></i> Go to Dashboard</a>
</div>
</body>
</html>
