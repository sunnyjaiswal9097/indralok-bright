<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title th:text="${isEdit} ? 'Edit Quotation' : 'New Quotation'">Quotation Form</title></head>
<body>
<main>
<div class="page-header">
  <h2><i class="fas fa-file-invoice"></i>
    <span th:text="${isEdit} ? 'Edit Quotation — ' + ${quotation.quotationNumber} : 'New Quotation'"></span>
  </h2>
  <a th:href="@{/quotation}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<form th:action="@{/quotation/save}" method="post" id="quotationForm">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <input type="hidden" name="editId" th:if="${isEdit}" th:value="${quotation.id}"/>

  <!-- Section: Parties -->
  <div class="form-card">
    <div class="form-card-header"><i class="fas fa-building"></i> Party Details</div>
    <div class="form-grid-2">
      <!-- Bill To -->
      <div class="form-section">
        <h4 class="section-label">Bill To</h4>
        <div class="form-group">
          <label>Company Name <span class="required">*</span></label>
          <input type="text" name="billToCompany" class="form-control" required
                 th:value="${quotation.billToCompany}" placeholder="e.g. Indralok Bright, Delhi"/>
        </div>
        <div class="form-group">
          <label>GSTIN</label>
          <input type="text" name="billToGstin" class="form-control"
                 th:value="${quotation.billToGstin}" placeholder="27AADCE6220C1Z5"/>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea name="billToAddress" class="form-control" rows="3"
                    th:text="${quotation.billToAddress}" placeholder="Full billing address"></textarea>
        </div>
      </div>
      <!-- Consignee -->
      <div class="form-section">
        <h4 class="section-label">Consignee / Ship To</h4>
        <div class="form-group">
          <label>Company Name</label>
          <input type="text" name="shipToCompany" class="form-control"
                 th:value="${quotation.shipToCompany}" placeholder="e.g. Indralok Bright"/>
        </div>
        <div class="form-group">
          <label>Site Info</label>
          <input type="text" name="shipToSiteInfo" class="form-control"
                 th:value="${quotation.shipToSiteInfo}" placeholder="e.g. Indralok Bright, Mayur Vihar"/>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea name="shipToAddress" class="form-control" rows="2"
                    th:text="${quotation.shipToAddress}"></textarea>
        </div>
        <div class="form-grid-3">
          <div class="form-group">
            <label>City</label>
            <input type="text" name="shipToCity" class="form-control" th:value="${quotation.shipToCity}"/>
          </div>
          <div class="form-group">
            <label>State</label>
            <input type="text" name="shipToState" class="form-control" th:value="${quotation.shipToState}"/>
          </div>
          <div class="form-group">
            <label>PIN</label>
            <input type="text" name="shipToPincode" class="form-control" th:value="${quotation.shipToPincode}" maxlength="6"/>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Section: Meta -->
  <div class="form-card">
    <div class="form-card-header"><i class="fas fa-calendar-alt"></i> Quotation Details</div>
    <div class="form-grid-4">
      <div class="form-group">
        <label>Date <span class="required">*</span></label>
        <input type="date" name="quotationDate" class="form-control" required
               th:value="${#temporals.format(quotation.quotationDate, 'yyyy-MM-dd')}"/>
      </div>
      <div class="form-group">
        <label>Valid Till / Period</label>
        <input type="text" name="validityPeriod" class="form-control"
               th:value="${quotation.validityPeriod}" placeholder="e.g. 30 days"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status" class="form-control">
          <option value="DRAFT"    th:selected="${quotation.status == 'DRAFT'}">Draft</option>
          <option value="SENT"     th:selected="${quotation.status == 'SENT'}">Sent</option>
          <option value="ACCEPTED" th:selected="${quotation.status == 'ACCEPTED'}">Accepted</option>
          <option value="REJECTED" th:selected="${quotation.status == 'REJECTED'}">Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label>GST Type</label>
        <select name="gstType" class="form-control" id="gstType" onchange="toggleGst()">
          <option value="CGST_SGST" th:selected="${quotation.gstType == 'CGST_SGST'}">CGST + SGST</option>
          <option value="IGST"      th:selected="${quotation.gstType == 'IGST'}">IGST</option>
          <option value="NONE"      th:selected="${quotation.gstType == 'NONE'}">No GST</option>
        </select>
      </div>
    </div>
    <div class="form-grid-3" id="gstFields">
      <div class="form-group" id="cgstField">
        <label>CGST %</label>
        <input type="number" name="cgstPercent" id="cgstPercent" class="form-control gst-input"
               step="0.01" min="0" max="50"
               th:value="${quotation.cgstPercent}" onchange="recalculate()"/>
      </div>
      <div class="form-group" id="sgstField">
        <label>SGST %</label>
        <input type="number" name="sgstPercent" id="sgstPercent" class="form-control gst-input"
               step="0.01" min="0" max="50"
               th:value="${quotation.sgstPercent}" onchange="recalculate()"/>
      </div>
      <div class="form-group" id="igstField" style="display:none">
        <label>IGST %</label>
        <input type="number" name="igstPercent" id="igstPercent" class="form-control gst-input"
               step="0.01" min="0" max="50"
               th:value="${quotation.igstPercent}" onchange="recalculate()"/>
      </div>
    </div>
  </div>

  <!-- Section: Items -->
  <div class="form-card">
    <div class="form-card-header">
      <span><i class="fas fa-list"></i> Line Items</span>
      <button type="button" class="btn btn-sm btn-primary" onclick="addRow()"><i class="fas fa-plus"></i> Add Row</button>
    </div>
    <div class="table-responsive">
      <table class="table items-form-table" id="itemsTable">
        <thead>
          <tr>
            <th style="width:45px">S.No</th>
            <th>Description <span class="required">*</span></th>
            <th style="width:110px">Quantity</th>
            <th style="width:90px">Unit</th>
            <th style="width:120px">Rate (₹)</th>
            <th style="width:130px">Amount (₹)</th>
            <th style="width:40px"></th>
          </tr>
        </thead>
        <tbody id="itemsBody">
          <tr th:each="item, stat : ${quotation.items}" th:id="'row-' + ${stat.index}">
            <td class="center"><span class="sno" th:text="${stat.count}"></span></td>
            <td><textarea name="itemDescription" class="form-control" rows="2"
                          th:text="${item.description}" placeholder="Work description..." required></textarea></td>
            <td><input type="number" name="itemQuantity" class="form-control qty-input text-center"
                       step="0.01" min="0" th:value="${item.quantity}" onchange="calcRow(this)" required/></td>
            <td>
              <select name="itemUnit" class="form-control">
                <option value="SQFT" th:selected="${item.unit == 'SQFT'}">SQFT</option>
                <option value="RFT"  th:selected="${item.unit == 'RFT'}">RFT</option>
                <option value="NOS"  th:selected="${item.unit == 'NOS'}">NOS</option>
                <option value="MTR"  th:selected="${item.unit == 'MTR'}">MTR</option>
                <option value="KG"   th:selected="${item.unit == 'KG'}">KG</option>
                <option value="LTR"  th:selected="${item.unit == 'LTR'}">LTR</option>
                <option value="LS"   th:selected="${item.unit == 'LS'}">LS (Lumpsum)</option>
              </select>
            </td>
            <td><input type="number" name="itemRate" class="form-control rate-input text-center"
                       step="0.01" min="0" th:value="${item.rate}" onchange="calcRow(this)" required/></td>
            <td><input type="text" name="itemAmount" class="form-control amount-display text-center"
                       th:value="${item.amount}" readonly/></td>
            <td><button type="button" class="btn btn-icon btn-delete" onclick="removeRow(this)"><i class="fas fa-trash"></i></button></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Totals -->
    <div class="totals-form">
      <div class="total-spacer"></div>
      <div class="totals-right">
        <div class="total-row-item"><span>Sub Total:</span><span class="fw-bold" id="subtotalDisplay">₹0.00</span></div>
        <div class="total-row-item" id="cgstRow"><span id="cgstLabel">CGST (9%):</span><span id="cgstDisplay">₹0.00</span></div>
        <div class="total-row-item" id="sgstRow"><span id="sgstLabel">SGST (9%):</span><span id="sgstDisplay">₹0.00</span></div>
        <div class="total-row-item" id="igstRow" style="display:none"><span id="igstLabel">IGST (18%):</span><span id="igstDisplay">₹0.00</span></div>
        <div class="total-row-item total-final"><span>Grand Total:</span><span id="grandTotalDisplay" class="grand-total-val">₹0.00</span></div>
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="form-card">
    <div class="form-card-header"><i class="fas fa-sticky-note"></i> Terms &amp; Conditions / Notes</div>
    <div class="form-group">
      <textarea name="notes" class="form-control" rows="4"
                th:text="${quotation.notes}" placeholder="Terms, conditions, payment terms, etc."></textarea>
    </div>
  </div>

  <!-- Submit -->
  <div class="form-actions">
    <a th:href="@{/quotation}" class="btn btn-outline">Cancel</a>
    <button type="submit" class="btn btn-primary btn-lg">
      <i class="fas fa-save"></i>
      <span th:text="${isEdit} ? 'Update Quotation' : 'Save Quotation'"></span>
    </button>
  </div>
</form>

<!-- Row Template -->
<template id="rowTemplate">
  <tr>
    <td class="center"><span class="sno"></span></td>
    <td><textarea name="itemDescription" class="form-control" rows="2" placeholder="Work description..." required></textarea></td>
    <td><input type="number" name="itemQuantity" class="form-control qty-input text-center" step="0.01" min="0" onchange="calcRow(this)" required/></td>
    <td>
      <select name="itemUnit" class="form-control">
        <option value="SQFT">SQFT</option>
        <option value="RFT">RFT</option>
        <option value="NOS">NOS</option>
        <option value="MTR">MTR</option>
        <option value="KG">KG</option>
        <option value="LTR">LTR</option>
        <option value="LS">LS (Lumpsum)</option>
      </select>
    </td>
    <td><input type="number" name="itemRate" class="form-control rate-input text-center" step="0.01" min="0" onchange="calcRow(this)" required/></td>
    <td><input type="text" name="itemAmount" class="form-control amount-display text-center" readonly/></td>
    <td><button type="button" class="btn btn-icon btn-delete" onclick="removeRow(this)"><i class="fas fa-trash"></i></button></td>
  </tr>
</template>

<script>
  // Init on load
  window.addEventListener('DOMContentLoaded', () => {
    recalculate();
    toggleGst();
    // If no rows, add one
    if (document.querySelectorAll('#itemsBody tr').length === 0) addRow();
  });

  function addRow() {
    const template = document.getElementById('rowTemplate');
    const clone = template.content.cloneNode(true);
    document.getElementById('itemsBody').appendChild(clone);
    updateSNos();
  }

  function removeRow(btn) {
    const rows = document.querySelectorAll('#itemsBody tr');
    if (rows.length <= 1) { alert('At least one item is required.'); return; }
    btn.closest('tr').remove();
    updateSNos();
    recalculate();
  }

  function updateSNos() {
    document.querySelectorAll('#itemsBody tr').forEach((row, idx) => {
      const sno = row.querySelector('.sno');
      if (sno) sno.textContent = idx + 1;
    });
  }

  function calcRow(input) {
    const row = input.closest('tr');
    const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
    const rate = parseFloat(row.querySelector('.rate-input').value) || 0;
    const amt = (qty * rate).toFixed(2);
    row.querySelector('.amount-display').value = amt;
    recalculate();
  }

  function recalculate() {
    let subtotal = 0;
    document.querySelectorAll('.amount-display').forEach(el => {
      subtotal += parseFloat(el.value) || 0;
    });
    const gstType = document.getElementById('gstType').value;
    const cgstPct = parseFloat(document.getElementById('cgstPercent').value) || 0;
    const sgstPct = parseFloat(document.getElementById('sgstPercent').value) || 0;
    const igstPct = parseFloat(document.getElementById('igstPercent').value) || 0;

    let total = subtotal;
    if (gstType === 'CGST_SGST') {
      const cgst = subtotal * cgstPct / 100;
      const sgst = subtotal * sgstPct / 100;
      document.getElementById('cgstDisplay').textContent = '₹' + cgst.toLocaleString('en-IN', {minimumFractionDigits:2});
      document.getElementById('sgstDisplay').textContent = '₹' + sgst.toLocaleString('en-IN', {minimumFractionDigits:2});
      document.getElementById('cgstLabel').textContent = 'CGST (' + cgstPct + '%):';
      document.getElementById('sgstLabel').textContent = 'SGST (' + sgstPct + '%):';
      total = subtotal + cgst + sgst;
    } else if (gstType === 'IGST') {
      const igst = subtotal * igstPct / 100;
      document.getElementById('igstDisplay').textContent = '₹' + igst.toLocaleString('en-IN', {minimumFractionDigits:2});
      document.getElementById('igstLabel').textContent = 'IGST (' + igstPct + '%):';
      total = subtotal + igst;
    }

    document.getElementById('subtotalDisplay').textContent = '₹' + subtotal.toLocaleString('en-IN', {minimumFractionDigits:2});
    document.getElementById('grandTotalDisplay').textContent = '₹' + total.toLocaleString('en-IN', {minimumFractionDigits:2});
  }

  function toggleGst() {
    const type = document.getElementById('gstType').value;
    document.getElementById('cgstField').style.display = (type === 'CGST_SGST') ? '' : 'none';
    document.getElementById('sgstField').style.display = (type === 'CGST_SGST') ? '' : 'none';
    document.getElementById('igstField').style.display = (type === 'IGST') ? '' : 'none';
    document.getElementById('cgstRow').style.display  = (type === 'CGST_SGST') ? '' : 'none';
    document.getElementById('sgstRow').style.display  = (type === 'CGST_SGST') ? '' : 'none';
    document.getElementById('igstRow').style.display  = (type === 'IGST') ? '' : 'none';
    recalculate();
  }
</script>
</main>
</body>
</html>
