<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title th:text="${isEdit} ? 'Edit PO' : 'New Purchase Order'">PO Form</title></head>
<body>
<main>
<div class="page-header">
  <h2><i class="fas fa-shopping-cart"></i>
    <span th:text="${isEdit} ? 'Edit PO — ' + ${purchaseOrder.poNumber} : 'New Purchase Order'"></span>
  </h2>
  <a th:href="@{/purchase-order}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div th:if="${fromQuotation}" class="flash flash-success" style="margin-bottom:16px">
  <i class="fas fa-info-circle"></i> Pre-filled from Quotation: <strong th:text="${fromQuotation.quotationNumber}"></strong>
</div>

<form th:action="@{/purchase-order/save}" method="post" id="poForm">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <input type="hidden" name="editId" th:if="${isEdit}" th:value="${purchaseOrder.id}"/>
  <input type="hidden" name="quotationId" th:if="${purchaseOrder.quotation}" th:value="${purchaseOrder.quotation.id}"/>

  <!-- Vendor / Delivery -->
  <div class="form-card">
    <div class="form-card-header"><i class="fas fa-truck"></i> Vendor &amp; Delivery Details</div>
    <div class="form-grid-2">
      <div class="form-section">
        <h4 class="section-label">Vendor / Supplier</h4>
        <div class="form-group">
          <label>Vendor Name <span class="required">*</span></label>
          <input type="text" name="vendorName" class="form-control" required
                 th:value="${purchaseOrder.vendorName}" placeholder="Supplier company name"/>
        </div>
        <div class="form-group">
          <label>GSTIN</label>
          <input type="text" name="vendorGstin" class="form-control" th:value="${purchaseOrder.vendorGstin}"/>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea name="vendorAddress" class="form-control" rows="3"
                    th:text="${purchaseOrder.vendorAddress}"></textarea>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label>Phone</label>
            <input type="text" name="vendorPhone" class="form-control" th:value="${purchaseOrder.vendorPhone}"/>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="vendorEmail" class="form-control" th:value="${purchaseOrder.vendorEmail}"/>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h4 class="section-label">Delivery / Site Address</h4>
        <div class="form-group">
          <label>Site Name</label>
          <input type="text" name="deliverySite" class="form-control"
                 th:value="${purchaseOrder.deliverySite}" placeholder="e.g. Indralok Bright Mayur Vihar Delhi"/>
        </div>
        <div class="form-group">
          <label>Delivery Address</label>
          <textarea name="deliveryAddress" class="form-control" rows="2"
                    th:text="${purchaseOrder.deliveryAddress}"></textarea>
        </div>
        <div class="form-grid-3">
          <div class="form-group">
            <label>City</label>
            <input type="text" name="deliveryCity" class="form-control" th:value="${purchaseOrder.deliveryCity}"/>
          </div>
          <div class="form-group">
            <label>State</label>
            <input type="text" name="deliveryState" class="form-control" th:value="${purchaseOrder.deliveryState}"/>
          </div>
          <div class="form-group">
            <label>PIN</label>
            <input type="text" name="deliveryPincode" class="form-control" th:value="${purchaseOrder.deliveryPincode}" maxlength="6"/>
          </div>
        </div>
        <div class="form-group">
          <label>Expected Delivery Date</label>
          <input type="date" name="deliveryDate" class="form-control"
                 th:value="${purchaseOrder.deliveryDate != null ? #temporals.format(purchaseOrder.deliveryDate,'yyyy-MM-dd') : ''}"/>
        </div>
      </div>
    </div>
  </div>

  <!-- PO Meta -->
  <div class="form-card">
    <div class="form-card-header"><i class="fas fa-calendar-alt"></i> PO Details</div>
    <div class="form-grid-4">
      <div class="form-group">
        <label>PO Date <span class="required">*</span></label>
        <input type="date" name="poDate" class="form-control" required
               th:value="${#temporals.format(purchaseOrder.poDate,'yyyy-MM-dd')}"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status" class="form-control">
          <option value="DRAFT"         th:selected="${purchaseOrder.status=='DRAFT'}">Draft</option>
          <option value="ISSUED"        th:selected="${purchaseOrder.status=='ISSUED'}">Issued</option>
          <option value="ACKNOWLEDGED"  th:selected="${purchaseOrder.status=='ACKNOWLEDGED'}">Acknowledged</option>
          <option value="CLOSED"        th:selected="${purchaseOrder.status=='CLOSED'}">Closed</option>
          <option value="CANCELLED"     th:selected="${purchaseOrder.status=='CANCELLED'}">Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label>GST Type</label>
        <select name="gstType" class="form-control" id="gstType" onchange="toggleGst()">
          <option value="CGST_SGST" th:selected="${purchaseOrder.gstType=='CGST_SGST'}">CGST + SGST</option>
          <option value="IGST"      th:selected="${purchaseOrder.gstType=='IGST'}">IGST</option>
          <option value="NONE"      th:selected="${purchaseOrder.gstType=='NONE'}">No GST</option>
        </select>
      </div>
      <div class="form-group">
        <label>Linked Quotation</label>
        <select name="quotationId" class="form-control">
          <option value="">-- None --</option>
          <option th:each="q : ${quotations}" th:value="${q.id}"
                  th:text="${q.quotationNumber} + ' — ' + ${q.billToCompany}"
                  th:selected="${purchaseOrder.quotation != null and purchaseOrder.quotation.id == q.id}"></option>
        </select>
      </div>
    </div>
    <div class="form-grid-3">
      <div class="form-group" id="cgstField">
        <label>CGST %</label>
        <input type="number" name="cgstPercent" id="cgstPercent" class="form-control gst-input"
               step="0.01" min="0" max="50" th:value="${purchaseOrder.cgstPercent}" onchange="recalculate()"/>
      </div>
      <div class="form-group" id="sgstField">
        <label>SGST %</label>
        <input type="number" name="sgstPercent" id="sgstPercent" class="form-control gst-input"
               step="0.01" min="0" max="50" th:value="${purchaseOrder.sgstPercent}" onchange="recalculate()"/>
      </div>
      <div class="form-group" id="igstField" style="display:none">
        <label>IGST %</label>
        <input type="number" name="igstPercent" id="igstPercent" class="form-control gst-input"
               step="0.01" min="0" max="50" th:value="${purchaseOrder.igstPercent}" onchange="recalculate()"/>
      </div>
    </div>
  </div>

  <!-- Items -->
  <div class="form-card">
    <div class="form-card-header">
      <span><i class="fas fa-list"></i> Line Items</span>
      <button type="button" class="btn btn-sm btn-primary" onclick="addRow()"><i class="fas fa-plus"></i> Add Row</button>
    </div>
    <div class="table-responsive">
      <table class="table items-form-table" id="itemsTable">
        <thead>
          <tr><th style="width:45px">S.No</th><th>Description</th><th style="width:110px">Qty</th>
              <th style="width:90px">Unit</th><th style="width:120px">Rate (₹)</th>
              <th style="width:130px">Amount (₹)</th><th style="width:130px">Remarks</th><th style="width:40px"></th></tr>
        </thead>
        <tbody id="itemsBody">
          <tr th:each="item, stat : ${purchaseOrder.items}">
            <td class="center"><span class="sno" th:text="${stat.count}"></span></td>
            <td><textarea name="itemDescription" class="form-control" rows="2"
                          th:text="${item.description}" required></textarea></td>
            <td><input type="number" name="itemQuantity" class="form-control qty-input text-right"
                       step="0.01" min="0" th:value="${item.quantity}" onchange="calcRow(this)" required/></td>
            <td>
              <select name="itemUnit" class="form-control">
                <option value="SQFT" th:selected="${item.unit=='SQFT'}">SQFT</option>
                <option value="RFT"  th:selected="${item.unit=='RFT'}">RFT</option>
                <option value="NOS"  th:selected="${item.unit=='NOS'}">NOS</option>
                <option value="MTR"  th:selected="${item.unit=='MTR'}">MTR</option>
                <option value="KG"   th:selected="${item.unit=='KG'}">KG</option>
                <option value="LTR"  th:selected="${item.unit=='LTR'}">LTR</option>
                <option value="LS"   th:selected="${item.unit=='LS'}">LS</option>
              </select>
            </td>
            <td><input type="number" name="itemRate" class="form-control rate-input text-right"
                       step="0.01" min="0" th:value="${item.rate}" onchange="calcRow(this)" required/></td>
            <td><input type="text" name="itemAmount" class="form-control amount-display text-right"
                       th:value="${item.amount}" readonly/></td>
            <td><input type="text" name="itemRemarks" class="form-control" th:value="${item.remarks}"/></td>
            <td><button type="button" class="btn btn-icon btn-delete" onclick="removeRow(this)"><i class="fas fa-trash"></i></button></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="totals-form">
      <div class="total-spacer"></div>
      <div class="totals-right">
        <div class="total-row-item"><span>Sub Total:</span><span class="fw-bold" id="subtotalDisplay">₹0.00</span></div>
        <div class="total-row-item" id="cgstRow"><span id="cgstLabel">CGST (9%):</span><span id="cgstDisplay">₹0.00</span></div>
        <div class="total-row-item" id="sgstRow"><span id="sgstLabel">SGST (9%):</span><span id="sgstDisplay">₹0.00</span></div>
        <div class="total-row-item" id="igstRow" style="display:none"><span id="igstLabel">IGST:</span><span id="igstDisplay">₹0.00</span></div>
        <div class="total-row-item total-final"><span>Grand Total:</span><span id="grandTotalDisplay" class="grand-total-val">₹0.00</span></div>
      </div>
    </div>
  </div>

  <!-- Terms -->
  <div class="form-card">
    <div class="form-card-header"><i class="fas fa-file-contract"></i> Payment Terms &amp; Conditions</div>
    <div class="form-grid-2">
      <div class="form-group">
        <label>Payment Terms</label>
        <input type="text" name="paymentTerms" class="form-control"
               th:value="${purchaseOrder.paymentTerms}" placeholder="e.g. Net 30 days"/>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <input type="text" name="notes" class="form-control" th:value="${purchaseOrder.notes}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Terms &amp; Conditions</label>
      <textarea name="termsAndConditions" class="form-control" rows="4"
                th:text="${purchaseOrder.termsAndConditions}"
                placeholder="Enter terms and conditions..."></textarea>
    </div>
  </div>

  <div class="form-actions">
    <a th:href="@{/purchase-order}" class="btn btn-outline">Cancel</a>
    <button type="submit" class="btn btn-primary btn-lg">
      <i class="fas fa-save"></i>
      <span th:text="${isEdit} ? 'Update Purchase Order' : 'Save Purchase Order'"></span>
    </button>
  </div>
</form>

<template id="rowTemplate">
  <tr>
    <td class="center"><span class="sno"></span></td>
    <td><textarea name="itemDescription" class="form-control" rows="2" required></textarea></td>
    <td><input type="number" name="itemQuantity" class="form-control qty-input text-right" step="0.01" min="0" onchange="calcRow(this)" required/></td>
    <td>
      <select name="itemUnit" class="form-control">
        <option value="SQFT">SQFT</option><option value="RFT">RFT</option>
        <option value="NOS">NOS</option><option value="MTR">MTR</option>
        <option value="KG">KG</option><option value="LTR">LTR</option><option value="LS">LS</option>
      </select>
    </td>
    <td><input type="number" name="itemRate" class="form-control rate-input text-right" step="0.01" min="0" onchange="calcRow(this)" required/></td>
    <td><input type="text" name="itemAmount" class="form-control amount-display text-right" readonly/></td>
    <td><input type="text" name="itemRemarks" class="form-control"/></td>
    <td><button type="button" class="btn btn-icon btn-delete" onclick="removeRow(this)"><i class="fas fa-trash"></i></button></td>
  </tr>
</template>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    recalculate(); toggleGst();
    if (document.querySelectorAll('#itemsBody tr').length === 0) addRow();
  });
  function addRow() {
    const clone = document.getElementById('rowTemplate').content.cloneNode(true);
    document.getElementById('itemsBody').appendChild(clone);
    updateSNos();
  }
  function removeRow(btn) {
    if (document.querySelectorAll('#itemsBody tr').length <= 1) { alert('At least one item required.'); return; }
    btn.closest('tr').remove(); updateSNos(); recalculate();
  }
  function updateSNos() {
    document.querySelectorAll('#itemsBody tr').forEach((r, i) => { const s = r.querySelector('.sno'); if(s) s.textContent = i+1; });
  }
  function calcRow(input) {
    const row = input.closest('tr');
    const qty = parseFloat(row.querySelector('.qty-input').value)||0;
    const rate = parseFloat(row.querySelector('.rate-input').value)||0;
    row.querySelector('.amount-display').value = (qty*rate).toFixed(2);
    recalculate();
  }
  function recalculate() {
    let sub = 0;
    document.querySelectorAll('.amount-display').forEach(e => sub += parseFloat(e.value)||0);
    const type = document.getElementById('gstType').value;
    const cp = parseFloat(document.getElementById('cgstPercent').value)||0;
    const sp = parseFloat(document.getElementById('sgstPercent').value)||0;
    const ip = parseFloat(document.getElementById('igstPercent').value)||0;
    let total = sub;
    if (type==='CGST_SGST') {
      const c=sub*cp/100, s=sub*sp/100;
      document.getElementById('cgstDisplay').textContent='₹'+c.toLocaleString('en-IN',{minimumFractionDigits:2});
      document.getElementById('sgstDisplay').textContent='₹'+s.toLocaleString('en-IN',{minimumFractionDigits:2});
      document.getElementById('cgstLabel').textContent='CGST ('+cp+'%):';
      document.getElementById('sgstLabel').textContent='SGST ('+sp+'%):';
      total=sub+c+s;
    } else if (type==='IGST') {
      const ig=sub*ip/100;
      document.getElementById('igstDisplay').textContent='₹'+ig.toLocaleString('en-IN',{minimumFractionDigits:2});
      document.getElementById('igstLabel').textContent='IGST ('+ip+'%):';
      total=sub+ig;
    }
    document.getElementById('subtotalDisplay').textContent='₹'+sub.toLocaleString('en-IN',{minimumFractionDigits:2});
    document.getElementById('grandTotalDisplay').textContent='₹'+total.toLocaleString('en-IN',{minimumFractionDigits:2});
  }
  function toggleGst() {
    const t=document.getElementById('gstType').value;
    document.getElementById('cgstField').style.display=(t==='CGST_SGST')?'':'none';
    document.getElementById('sgstField').style.display=(t==='CGST_SGST')?'':'none';
    document.getElementById('igstField').style.display=(t==='IGST')?'':'none';
    document.getElementById('cgstRow').style.display=(t==='CGST_SGST')?'':'none';
    document.getElementById('sgstRow').style.display=(t==='CGST_SGST')?'':'none';
    document.getElementById('igstRow').style.display=(t==='IGST')?'':'none';
    recalculate();
  }
</script>
</main>
</body>
</html>
